services:
  pkmeta-net:
    build:
      context: ../..
    container_name: pkmeta-net
    expose:
      - "8000"
    environment:
      - PKMETA_DB=/app/stats.sqlite
      - PKMETA_ATTACKS_DB=/app/attacks.sqlite
      - PKMETA_TEAMS_DB=/app/teams.sqlite
      - PKMETA_CANONICAL_HOST=pokemonchampionsmeta.net
      - PKMETA_SECONDARY_HOSTS=pkmeta.net,www.pkmeta.net,www.pokemonchampionsmeta.net
      - PKMETA_SITE_BRAND=Pkmeta
    volumes:
      - ../../stats.sqlite:/app/stats.sqlite:ro
      - ../../attacks.sqlite:/app/attacks.sqlite:ro
      - ../../teams.sqlite:/app/teams.sqlite
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: pkmeta-caddy
    depends_on:
      - pkmeta-net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
