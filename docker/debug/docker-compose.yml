services:
  pkmeta-net:
    build:
      context: ../..
    container_name: pkmeta-net-debug
    ports:
      - "8000:8000"
    environment:
      - PKMETA_DB=/app/stats.sqlite
      - PKMETA_ATTACKS_DB=/app/attacks.sqlite
      - PKMETA_TEAMS_DB=/app/teams-by-format
      - PKMETA_CHAMPIONS_SHEET_CACHE=/cache/champions_sheet_rows.json
    volumes:
      - ../../stats.sqlite:/app/stats.sqlite:ro
      - ../../attacks.sqlite:/app/attacks.sqlite:ro
      - ../../teams-by-format:/app/teams-by-format
      - ../../cache:/cache
    restart: unless-stopped
